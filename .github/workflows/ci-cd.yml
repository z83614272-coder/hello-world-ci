name: hello-world-ci-cd

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行单元测试
        run: pytest -v

  build:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 打包项目
        run: |
          mkdir dist
          cp app.py requirements.txt dist/
          zip -r hello-world.zip dist

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: hello-world-package
          path: hello-world.zip

  deploy-staging:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - name: 模拟部署到 Staging
        run: echo "Deploy to staging success!"
